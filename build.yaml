changelog: >
  Runs roughly three times faster: every
  subtitle track is now pulled out of a file in one pass instead of one full pass per track, and tracks
  recognize in parallel (see Max parallelism, which leaves half the cores to playback). Recognition
  picks the best matching glyph rather than the first one the database lists, which fixes words like
  "cLocK TlcKlNG" at the source and stops italics flickering on and off mid-word, and glyphs the
  splitter breaks apart (a double quote, an o-slash) now match. A track the database cannot really read
  is discarded instead of shipped: with only the bundled Latin database, a non-English track is often
  10-25 percent unreadable, and those files were being written as if they were fine. Spell-check no
  longer rewrites names, which cost you ADAMA as ASAMA and TYROL as TYRO; it also sees the whole series
  cast now, not just an episode's guest stars. The l-to-I fixes only run for English, which stops French
  losing every elided article. New: hearing-impaired (SDH) tracks are recognized from their own text,
  the unknown-glyph mark is now a box rather than an asterisk (dialogue uses asterisks), and the
  extracted-files list moved to its own dashboard page with a Reprocess button.
