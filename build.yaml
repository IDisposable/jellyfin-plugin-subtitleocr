overview: "OCR image-based DVD and Blu-ray subtitles to SRT or ASS"
description: >
  Converts embedded image-based subtitle tracks (VobSub/DVD and PGS/Blu-ray) to
  external SRT or ASS files using nOCR pattern matching. Pure managed code: no Tesseract
  and no native dependencies. The .nocr database format is interchange-compatible
  with Subtitle Edit, so databases trained or corrected in its GUI drop straight in.
  A scheduled task scans your Movie and Episode libraries and writes a subtitle file
  beside each image-based track. OCR text is optionally spell-checked with Hunspell and
  corrected with Subtitle Edit's OCR fix lists, both fetched on demand.
