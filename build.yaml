overview: "OCR image-based DVD and Blu-ray subtitles to SRT"
description: >
  Converts embedded image-based subtitle tracks (VobSub/DVD and PGS/Blu-ray) to
  external SRT files using nOCR pattern matching. Pure managed code: no Tesseract
  and no native dependencies. The .nocr database format is interchange-compatible
  with Subtitle Edit, so databases trained or corrected in its GUI drop straight in.
  A scheduled task scans your Movie and Episode libraries and writes an SRT beside
  each image-based track.
category: "Subtitles"
owner: "IDisposable"
artifacts:
  - "Jellyfin.Plugin.SubtitleOcr.dll"
  - "SubtitleOcr.Core.dll"
changelog: >
  Detect image-based subtitles by probing every Movie and Episode with ffprobe, since
  Jellyfin does not store PGS/VobSub streams in its metadata. A per-file cache skips
  files that are unchanged and were probed within a configurable window, with a
  force-rescan option. Word spacing now scales with subtitle line height, fixing spaces
  inserted between every letter on HD Blu-ray text. New options: extract only selected
  languages, discard a track whose dropped-event ratio is too high (removing any stale
  SRT), and a filename tag ({name}.{lang}.OCR.srt, shown as the subtitle title) so the
  plugin only ever overwrites or deletes its own output. A config-page modal lists every
  extracted file with a link to its movie or episode. The scheduled task now sits under
  its own category.
