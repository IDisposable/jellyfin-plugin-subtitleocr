changelog: >
  The bundled Latin database now includes glyph shapes trained on real disc fonts, so far fewer characters
  read as the unknown box and the text comes out noticeably cleaner. Recognition is faster as well: the
  matcher caps each comparison at the best match found so far, rounds and looks up candidates more
  directly, and skips the multi-segment merge for runs that cannot match, all while reading exactly the
  same characters. Text correction gains several fixes: the two-letter words It, Is, In and If are read
  with a lowercase l, a zero between letters becomes o (y0u to you), a split double quote rejoins into
  one, and padded sound-cue brackets tighten ("[ Sighs ]" to "[Sighs]"). A line that opens a sentence is
  capitalized after spell-check, so a misread at the start of a line resolves against the dictionary
  rather than freezing into a name it will not correct. When spell-check is enabled but no dictionary is
  present, the log now says so instead of leaving the text uncorrected in silence.
