changelog: >
  Initial production release. OCRs embedded image-based subtitles (VobSub/DVD and
  PGS/Blu-ray) to SRT files using nOCR pattern matching, with Subtitle Edit-compatible
  .nocr databases. Pure managed code: no Tesseract, no native dependencies. Optionally
  skips image tracks whose language already has a text subtitle.
