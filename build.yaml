changelog: >
  A run keeps itself off the large object heap by reusing its image buffers instead of allocating one per
  subtitle, so recognizing a library no longer drives the full garbage collections that interrupt playback.
  ASS output keeps the color the disc drew its subtitles in, as the track's style, with an override only
  on the lines that differ; Auto picks ASS for a track that uses more than one color, since that is a
  distinction SRT cannot carry. Whether a track is light text on a dark outline or the reverse is read off
  the track itself, per track, so the Invert luma setting is gone. The extracted-files page reprocesses a
  single item from its row, rather than only the whole log at once. A lowercase l after a speaker label
  ("STARBUCK: lt's a girl") is read as I, a line that starts a sentence is capitalized using the line
  before it, and a name is protected from spell-check in both singular and plural, so a cast list saying
  "Cylons" also protects "Cylon". Multi-segment glyphs (a double quote, an o-slash, a percent sign) are
  matched on shape, so they read at whatever size the disc drew them.
