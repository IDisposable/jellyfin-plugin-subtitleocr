changelog: >
  Italic emphasis follows the whole line, so a stray mid-word italic reads as the run around it while a
  genuine italic line stays italic. An accented Latin letter foreign to the track's language folds to its
  base ("Nothing" for "Nothińg"), keeping each language's own accents and leaving a real cast or character
  name alone; a setting turns it off. Text correction reads a one between two letters as l or I, rejoins a
  split contraction ("do n't"), closes a space before a comma or period, spaces a leading speaker dash, and
  folds curly quotes to straight. A cue never ends after the next one begins, and a too-short cue is held to
  a readable minimum. ASS escapes a literal brace, rounds its timecodes, and places an off-center sign with
  the full alignment grid. Language and hearing-impaired detection read a cue's words, not its markup, so
  close languages like Danish and Norwegian separate. Word spacing is calibrated to real disc fonts so
  run-together words come apart. An optional aggressive mode applies the riskier digit-letter fixes (5/S,
  8/B) for a poorly scanned disc.
