changelog: >
  Output format is now selectable: SRT, ASS, or Auto, which decides per track and writes ASS
  only when a cue sits away from the bottom of the screen (PGS carries the position), so an
  ordinary track keeps the universally supported format. OCR text is spell-checked with
  Hunspell, protecting Title-case proper nouns and words drawn from the item's Jellyfin
  metadata (title, overview, series, cast and character names) so show and character names
  survive. Subtitle Edit OCR fix replace lists are applied when present; dictionaries and fix
  lists download on demand and re-download once older than a configurable age. A track with an
  undetermined language now has one detected from its OCR text and is named accordingly, and the
  track title, forced, hearing-impaired, and commentary flags appear in the file name so commentary
  tracks are identifiable. A hearing-impaired track is recognized from its own text when the source
  flags nothing, which is the norm for a remuxed disc. New OCR corrections cover misread apostrophes
  in contractions, mid-word capital X, V, and I, optional ellipsis folding, and bogus italic runs
  around single characters and punctuation. An unread glyph now costs nothing when matching a word
  against the dictionary, so "batt□e" resolves to "battle" and a damaged name can be restored from
  the item's metadata. A new "Reprocess extracted subtitles" task re-OCRs every logged file from its
  source with the current settings. Each file is probed with a single ffprobe pass rather than two,
  and only one OCR or reprocess task runs at a time.
