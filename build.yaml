changelog: >
  The dashboard menu carries both plugin pages: "Subtitle OCR" for the settings and "Extracted
  Subtitles" for the list of extracted files, which also has a "Reprocess all" button that starts the
  reprocess task, shows its progress, and reloads the list when it finishes, plus a gear button that
  opens the settings. The plugin's Settings button opens the settings page.
