framework: "net9.0"
overview: "OCR image-based DVD and Blu-ray subtitles to SRT"
description: >
  Converts embedded image-based subtitle tracks (VobSub/DVD and PGS/Blu-ray) to
  external SRT files using nOCR pattern matching. Pure managed code: no Tesseract
  and no native dependencies. The .nocr database format is interchange-compatible
  with Subtitle Edit, so databases trained or corrected in its GUI drop straight in.
  A scheduled task scans your Movie and Episode libraries and writes an SRT beside
  each image-based track.
category: "Subtitles"
